name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: brief-linux-x86_64.tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: brief-linux-aarch64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: brief-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: brief-macos-aarch64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools
          # Cross-compilation toolchain for aarch64
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          binary=target/${{ matrix.target }}/release/brief
          tar czf ${{ matrix.archive }} -C $(dirname $binary) $(basename $binary)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt
          generate_release_notes: true

      - name: Update Homebrew formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          get_sha() {
            grep "$1" artifacts/checksums.txt | awk '{print $1}'
          }

          SHA_MACOS_AARCH64=$(get_sha "brief-macos-aarch64.tar.gz")
          SHA_MACOS_X86_64=$(get_sha "brief-macos-x86_64.tar.gz")
          SHA_LINUX_AARCH64=$(get_sha "brief-linux-aarch64.tar.gz")
          SHA_LINUX_X86_64=$(get_sha "brief-linux-x86_64.tar.gz")

          sed -i \
            -e "s/version \".*\"/version \"${VERSION}\"/" \
            Formula/brief.rb

          # Update each SHA by matching the sha256 line following the relevant URL line
          sed -i "/brief-macos-aarch64/{n; s/sha256 \"[^\"]*\"/sha256 \"${SHA_MACOS_AARCH64}\"/}" Formula/brief.rb
          sed -i "/brief-macos-x86_64/{n; s/sha256 \"[^\"]*\"/sha256 \"${SHA_MACOS_X86_64}\"/}" Formula/brief.rb
          sed -i "/brief-linux-aarch64/{n; s/sha256 \"[^\"]*\"/sha256 \"${SHA_LINUX_AARCH64}\"/}" Formula/brief.rb
          sed -i "/brief-linux-x86_64/{n; s/sha256 \"[^\"]*\"/sha256 \"${SHA_LINUX_X86_64}\"/}" Formula/brief.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/brief.rb
          git diff --staged --quiet || git commit -m "chore: update Homebrew formula to ${GITHUB_REF_NAME}"
          git push origin HEAD:main
